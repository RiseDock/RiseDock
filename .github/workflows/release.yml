name: Release

on:
  push:
    tags:
      - 'v*'

env:
  VERSION: ${{ github.ref_name }}
  OSS_BUCKET: risedock-releases
  OSS_ENDPOINT: oss-cn-beijing.aliyuncs.com
  GITEE_REPO: rise-dock/RiseDock

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RiseDock v__VERSION__'
          releaseBody: '自动发布的 Release'
          releaseDraft: false
          prerelease: false

      - name: Verify build artifacts
        run: |
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: risedock-build-${{ env.VERSION }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json

  publish:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: risedock-build-${{ env.VERSION }}
          path: ./build

      - name: Verify artifacts
        run: |
          Get-ChildItem -Path "./build"

      # ========== 上传到阿里云 OSS ==========
      - name: Setup ossutil
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/aliyun/ossutil/releases/download/1.7.19/ossutil-windows64.exe" -OutFile "ossutil.exe"

      - name: Config ossutil
        shell: pwsh
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          $env:OSS_ACCESS_KEY_ID = "${{ secrets.OSS_ACCESS_KEY_ID }}"
          $env:OSS_ACCESS_KEY_SECRET = "${{ secrets.OSS_ACCESS_KEY_SECRET }}"
          .\ossutil.exe config -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -e ${{ env.OSS_ENDPOINT }}

      - name: Upload to OSS
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "./build" -Filter "*.exe" | Select-Object -First 1
          $sig = Get-ChildItem -Path "./build" -Filter "*.sig" | Select-Object -First 1
          $ossDir = "app-${{ env.VERSION }}"
          Write-Host "Uploading to OSS..."
          .\ossutil.exe cp $exe.FullName "oss://${{ env.OSS_BUCKET }}/${ossDir}/"
          .\ossutil.exe cp $sig.FullName "oss://${{ env.OSS_BUCKET }}/${ossDir}/"
          Write-Host "OSS upload complete!"

      - name: Generate latest.json for OSS
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "./build" -Filter "*.exe" | Select-Object -First 1
          $ossExeUrl = "https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ env.VERSION }}/$($exe.Name)"
          $json = Get-Content "./build/latest.json" | ConvertFrom-Json
          $json.platforms.windows.url = $ossExeUrl
          $json | ConvertTo-Json -Depth 10 | Set-Content "./build/latest_modified.json"
          Write-Host "Updated latest.json:"
          Get-Content "./build/latest_modified.json"

      - name: Upload latest.json to OSS
        shell: pwsh
        run: |
          $ossDir = "app-${{ env.VERSION }}"
          .\ossutil.exe cp "./build/latest_modified.json" "oss://${{ env.OSS_BUCKET }}/${ossDir}/latest.json"
          Write-Host ""
          Write-Host "=== OSS URL ==="
          Write-Host "https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/${ossDir}/latest.json"

      # ========== 发布到 GitHub Release ==========
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./build/*.exe
            ./build/*.sig
            ./build/latest_modified.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 发布到 Gitee Release ==========
      - name: Delete old Gitee release
        shell: pwsh
        run: |
          $headers = @{ Authorization = "token ${{ secrets.GITEE_TOKEN }}" }
          $version = "${{ env.VERSION }}"
          try {
            $existing = Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/app-$version" -Headers $headers
            if ($existing.id) {
              Write-Host "Deleting old release: $($existing.id)"
              Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$($existing.id)" -Headers $headers -Method Delete
            }
          } catch { Write-Host "No existing release found" }

      - name: Create Gitee Release
        shell: pwsh
        id: gitee
        run: |
          $headers = @{
            Authorization = "token ${{ secrets.GITEE_TOKEN }}"
            "Content-Type" = "application/json"
          }
          $body = @{
            tag_name = "app-${{ env.VERSION }}"
            name = "RiseDock ${{ env.VERSION }}"
            body = "**国内使用：https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ env.VERSION }}/latest.json**"
          } | ConvertTo-Json
          $result = Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases" -Headers $headers -Method Post -Body $body
          Write-Host "Created release ID: $($result.id)"
          Write-Host "RELEASE_ID=$($result.id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload signature to Gitee
        shell: pwsh
        run: |
          $sig = Get-ChildItem -Path "./build" -Filter "*.sig" | Select-Object -First 1
          $headers = @{ Authorization = "token ${{ secrets.GITEE_TOKEN }}" }
          $form = @{
            file = Get-Item $sig.FullName
            name = $sig.Name
          }
          Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/${{ steps.gitee.outputs.RELEASE_ID }}/attach_files" -Headers $headers -Method Post -Form $form

      - name: Summary
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  Release ${{ env.VERSION }} Complete!"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }}"
          Write-Host "Gitee:  https://gitee.com/${{ env.GITEE_REPO }}/releases/tag/app-${{ env.VERSION }}"
          Write-Host "OSS:    https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ env.VERSION }}/latest.json"
          Write-Host ""

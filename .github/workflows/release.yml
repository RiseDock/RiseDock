name: Release

on:
  push:
    tags:
      - 'v*'

env:
  VERSION: ${{ github.ref_name }}
  OSS_BUCKET: risedock-releases
  OSS_ENDPOINT: oss-cn-beijing.aliyuncs.com
  GITEE_REPO: rise-dock/RiseDock

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Tauri CLI
        run: |
          npm install
          npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Verify build artifacts
        run: |
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: risedock-build-${{ env.VERSION }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig

  publish:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: risedock-build-${{ env.VERSION }}
          path: ./build

      - name: Find build artifacts
        shell: pwsh
        run: |
          # List all files to understand artifact structure
          Get-ChildItem -Path "./build" -Recurse -File | Select-Object FullName
          # Find exe and sig
          $exe = Get-ChildItem -Path "./build" -Recurse -Filter "*.exe" | Where-Object { $_.Name -notlike "ossutil*" } | Select-Object -First 1
          $sig = Get-ChildItem -Path "./build" -Recurse -Filter "*.sig" | Select-Object -First 1
          Write-Host "EXE: $($exe.FullName)"
          Write-Host "SIG: $($sig.FullName)"
          # Save paths for next steps via env (write to temp file)
          @{
            exePath = $exe.FullName
            sigPath = $sig.FullName
            exeName = $exe.Name
            sigName = $sig.Name
          } | ConvertTo-Json | Set-Content "$env:GITHUB_WORKSPACE/artifacts.json"
          Write-Host "Artifact paths saved to artifacts.json"

      # ========== 上传到阿里云 OSS ==========
      - name: Setup ossutil
        shell: pwsh
        run: |
          $zipUrl = "https://github.com/aliyun/ossutil/releases/download/v1.7.18/ossutil-v1.7.18-windows-amd64.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "ossutil.zip"
          Expand-Archive -Path "ossutil.zip" -DestinationPath "." -Force
          Get-ChildItem -Path "." -Filter "ossutil*"
          Remove-Item "ossutil.zip"

      - name: Config ossutil
        shell: pwsh
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          $ossutil = Get-ChildItem -Path "." -Recurse -Filter "ossutil*.exe" | Select-Object -First 1
          $env:OSS_ACCESS_KEY_ID = "${{ secrets.OSS_ACCESS_KEY_ID }}"
          $env:OSS_ACCESS_KEY_SECRET = "${{ secrets.OSS_ACCESS_KEY_SECRET }}"
          Write-Host "Found ossutil: $($ossutil.FullName)"
          & $ossutil.FullName config -i $env:OSS_ACCESS_KEY_ID -k $env:OSS_ACCESS_KEY_SECRET -e ${{ env.OSS_ENDPOINT }}

      - name: Upload to OSS
        shell: pwsh
        run: |
          $ossutil = Get-ChildItem -Path "." -Recurse -Filter "ossutil*.exe" | Select-Object -First 1
          $exe = Get-ChildItem -Path "./build" -Recurse -Filter "*.exe" | Where-Object { $_.Name -notlike "ossutil*" } | Select-Object -First 1
          $sig = Get-ChildItem -Path "./build" -Recurse -Filter "*.sig" | Select-Object -First 1
          $ossDir = "app-${{ env.VERSION }}"
          Write-Host "Uploading to OSS..."
          & $ossutil.FullName cp $exe.FullName "oss://${{ env.OSS_BUCKET }}/${ossDir}/"
          & $ossutil.FullName cp $sig.FullName "oss://${{ env.OSS_BUCKET }}/${ossDir}/"
          Write-Host "OSS upload complete!"

      - name: Generate latest.json for OSS
        shell: pwsh
        run: |
          # Find exe in build directory (self-contained)
          $exe = Get-ChildItem -Path "./build" -Recurse -Filter "*.exe" | Where-Object { $_.Name -notlike "ossutil*" } | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found in ./build"
            exit 1
          }
          $sig = Get-ChildItem -Path "./build" -Recurse -Filter "*.sig" | Select-Object -First 1
          if (-not $sig) {
            Write-Error "No .sig found in ./build"
            exit 1
          }
          Write-Host "EXE: $($exe.FullName)"
          Write-Host "SIG: $($sig.FullName)"

          # Build OSS URLs
          $ossDir = "app-${{ env.VERSION }}"
          $ossExeUrl = "https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/${ossDir}/$($exe.Name)"
          $ossSigUrl = "https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/${ossDir}/$($sig.Name)"

          # Generate latest.json from scratch (Tauri does NOT generate this file)
          # Format: https://tauri.app/distribute/channels#the-update-json
          $latestJson = @{
            version = "${{ env.VERSION }}"
            date    = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              windows = @{
                signature = ""
                url      = $ossExeUrl
              }
            }
          }
          # Read sig content and embed it
          $sigContent = Get-Content $sig.FullName -Raw
          $latestJson.platforms.windows.signature = $sigContent.Trim()

          # Save to GITHUB_WORKSPACE (accessible by all subsequent steps)
          $outPath = Join-Path $env:GITHUB_WORKSPACE "latest_modified.json"
          $latestJson | ConvertTo-Json -Depth 10 | Set-Content $outPath -Encoding utf8

          Write-Host "Generated latest.json:"
          Get-Content $outPath

      - name: Upload latest.json to OSS
        shell: pwsh
        run: |
          $ossutil = Get-ChildItem -Path "." -Recurse -Filter "ossutil*.exe" | Select-Object -First 1
          $ossDir = "app-${{ env.VERSION }}"
          $modifiedJson = Join-Path $env:GITHUB_WORKSPACE "latest_modified.json"
          & $ossutil.FullName cp $modifiedJson "oss://${{ env.OSS_BUCKET }}/${ossDir}/latest.json"
          Write-Host ""
          Write-Host "=== OSS URL ==="
          Write-Host "https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/${ossDir}/latest.json"

      # ========== 发布到 GitHub Release ==========
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            C:/RiseDock_${{ env.VERSION }}_x64-setup.exe
            C:/RiseDock_${{ env.VERSION }}_x64-setup.exe.sig
            ${{ github.workspace }}/latest_modified.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 发布到 Gitee Release ==========
      - name: Delete old Gitee release
        shell: pwsh
        run: |
          $headers = @{ Authorization = "token ${{ secrets.GITEE_TOKEN }}" }
          $version = "${{ env.VERSION }}"
          try {
            $existing = Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/$version" -Headers $headers
            if ($existing.id) {
              Write-Host "Deleting old release: $($existing.id)"
              Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$($existing.id)" -Headers $headers -Method Delete
            }
          } catch { Write-Host "No existing release found" }

      - name: Create Gitee Release
        shell: pwsh
        id: gitee
        run: |
          $headers = @{
            Authorization = "token ${{ secrets.GITEE_TOKEN }}"
            "Content-Type" = "application/json"
          }
          $body = @{
            tag_name = "${{ env.VERSION }}"
            target_commitish = "main"
            name = "RiseDock ${{ env.VERSION }}"
            body = "**国内使用：https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ env.VERSION }}/latest.json**"
          } | ConvertTo-Json
          $result = Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases" -Headers $headers -Method Post -Body $body
          Write-Host "Created release ID: $($result.id)"
          Write-Host "RELEASE_ID=$($result.id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Summary
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  Release ${{ env.VERSION }} Complete!"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }}"
          Write-Host "Gitee:  https://gitee.com/${{ env.GITEE_REPO }}/releases/tag/${{ env.VERSION }}"
          Write-Host "OSS:    https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ env.VERSION }}/latest.json"
          Write-Host ""

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  VERSION: ${{ github.ref_name }}

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Tauri CLI
        run: |
          npm install
          npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Verify build artifacts
        run: |
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis"

      - name: Move artifacts to root
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          $sig = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.sig" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "./" -Force
            Write-Host "Copied: $($exe.Name)"
          }
          if ($sig) {
            Copy-Item $sig.FullName "./" -Force
            Write-Host "Copied: $($sig.Name)"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./*.exe
            ./*.sig
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  Release ${{ env.VERSION }} Complete!"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }}"
          Write-Host ""

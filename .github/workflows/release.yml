name: Release

on:
  push:
    tags:
      - 'v*'

env:
  VERSION: ${{ github.ref_name }}
  OSS_BUCKET: risedock-releases
  OSS_ENDPOINT: oss-cn-beijing.aliyuncs.com
  GITEE_REPO: rise-dock/RiseDock
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri/target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          update: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libclang-dev \
            clang

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RiseDock v__VERSION__'
          releaseBody: '自动发布的 Release'
          releaseDraft: false
          prerelease: false

      - name: Verify build artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -la src-tauri/target/release/bundle/nsis/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: risedock-build-${{ env.VERSION }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: risedock-build-${{ env.VERSION }}
          path: ./build

      - name: Verify artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la ./build/

      # ========== 上传到阿里云 OSS ==========
      - name: Setup ossutil
        run: |
          wget https://github.com/aliyun/ossutil/releases/download/1.7.19/ossutil-linux64 -O ossutil
          chmod 755 ossutil
          ./ossutil config \
            --access-key-id ${{ secrets.OSS_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            --endpoint ${{ env.OSS_ENDPOINT }}

      - name: Upload to OSS
        run: |
          EXE=$(ls ./build/*.exe | head -1)
          SIG=$(ls ./build/*.sig | head -1)
          OSS_DIR="app-${{ env.VERSION }}"
          
          echo "Uploading to OSS..."
          ./ossutil cp ./build/*.exe oss://${{ env.OSS_BUCKET }}/${OSS_DIR}/ --object-type=file
          ./ossutil cp ./build/*.sig oss://${{ env.OSS_BUCKET }}/${OSS_DIR}/ --object-type=file
          echo "OSS upload complete!"

      - name: Generate latest.json for OSS
        run: |
          EXE_NAME=$(basename $(ls ./build/*.exe | head -1))
          OSS_EXE_URL="https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ env.VERSION }}/${EXE_NAME}"
          
          python3 << EOF
          import json
          with open('./build/latest.json', 'r') as f:
              data = json.load(f)
          data['platforms']['windows']['url'] = '$OSS_EXE_URL'
          with open('./build/latest_modified.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print("Updated latest.json:")
          print(json.dumps(data, indent=2, ensure_ascii=False))
          EOF

      - name: Upload latest.json to OSS
        run: |
          OSS_DIR="app-${{ env.VERSION }}"
          ./ossutil cp ./build/latest_modified.json oss://${{ env.OSS_BUCKET }}/${OSS_DIR}/latest.json --object-type=file
          echo ""
          echo "=== OSS URL ==="
          echo "https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/${OSS_DIR}/latest.json"

      # ========== 发布到 GitHub Release ==========
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./build/*.exe
            ./build/*.sig
            ./build/latest_modified.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 发布到 Gitee Release ==========
      - name: Get release info
        id: release
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Delete old Gitee release
        run: |
          EXISTING_ID=$(curl -s -u "${{ secrets.GITEE_TOKEN }}" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/tags/app-${{ steps.release.outputs.TAG_NAME }}" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2 || true)
          
          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
            echo "Deleting old release: $EXISTING_ID"
            curl -s -u "${{ secrets.GITEE_TOKEN }}" -X DELETE \
              "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/$EXISTING_ID"
          fi

      - name: Create Gitee Release
        id: gitee
        run: |
          BODY="**\u56fd\u5185\u4f7f\u7528\uff1a https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ steps.release.outputs.TAG_NAME }}/latest.json**"
          BODY+="\n\n---\n\n**\u66f4\u65b0\u5185\u5bb9\uff1a**\n- \u81ea\u52a8\u66f4\u65b0\u68c0\u67e5\n- \u4f18\u5316\u7528\u6237\u4f53\u9a8c\n- \u4fee\u590d\u5df2\u77e5\u95ee\u9898"
          
          RELEASE_ID=$(curl -s -u "${{ secrets.GITEE_TOKEN }}" -X POST \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"app-${{ steps.release.outputs.TAG_NAME }}\",\"name\":\"RiseDock ${{ steps.release.outputs.TAG_NAME }}\",\"body\":\"${BODY}\"}" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          
          echo "Created release ID: $RELEASE_ID"
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload signature to Gitee
        run: |
          SIG=$(ls ./build/*.sig | head -1)
          curl -s -u "${{ secrets.GITEE_TOKEN }}" -X POST \
            -F "file=@${SIG}" \
            -F "name=$(basename $SIG)" \
            "https://gitee.com/api/v5/repos/${{ env.GITEE_REPO }}/releases/${{ steps.gitee.outputs.RELEASE_ID }}/attach_files"

      - name: Summary
        run: |
          echo ""
          echo "========================================"
          echo "  Release ${{ env.VERSION }} Complete!"
          echo "========================================"
          echo ""
          echo "GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }}"
          echo "Gitee:  https://gitee.com/${{ env.GITEE_REPO }}/releases/tag/app-${{ env.VERSION }}"
          echo "OSS:    https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/app-${{ env.VERSION }}/latest.json"
          echo ""
